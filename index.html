<html lang="fr">

<style>
:root{--wine:#5D1F2B;--wine-deep:#3F1219;--wine-soft:#7A3645;--chalk:#F4EEE3;--chalk-deep:#E6DBC8;--paper:#FBF7EE;--paper-line:#D9CFBA;--ink:#1A1814;--ink-soft:#4A463D;--ink-faint:#8C8678;--leaf:#3D5236;--danger:#8B2D2D}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Geist',system-ui,sans-serif;background:var(--chalk);color:var(--ink);min-height:100dvh;font-size:16px;line-height:1.5;overflow-x:hidden;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(140,134,120,.08) 1px,transparent 0);background-size:18px 18px;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 18px 100px;min-height:100dvh}
.brand{display:flex;align-items:baseline;justify-content:space-between;padding:18px 0 22px;border-bottom:1px solid var(--paper-line);margin-bottom:24px}
.logo{font-family:'Fraunces',serif;font-weight:500;font-size:26px;letter-spacing:-0.02em;color:var(--wine);font-style:italic}
.logo b{font-weight:600;font-style:normal}
.tagline{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
h1{font-family:'Fraunces',serif;font-weight:500;font-size:28px;line-height:1.15;margin-bottom:8px;color:var(--ink);letter-spacing:-0.01em}
h1 em{font-style:italic;color:var(--wine);font-weight:400}
h3{font-size:13px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-faint);font-weight:600;font-family:'Geist',sans-serif;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.subtitle{color:var(--ink-soft);font-size:14px;margin-bottom:22px}
.ornament{display:flex;align-items:center;gap:14px;color:var(--ink-faint);margin:28px 0 18px;font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:500}
.ornament::before,.ornament::after{content:'';flex:1;height:1px;background:var(--paper-line)}
.card{background:var(--paper);border:1px solid var(--paper-line);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 0 rgba(0,0,0,.02)}
.field{margin-bottom:14px}.field:last-child{margin-bottom:0}
label{display:block;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
input[type=text],input[type=email],textarea,select,.sel-btn{width:100%;padding:13px 14px;background:#fff;border:1px solid var(--paper-line);border-radius:9px;font-family:inherit;font-size:16px;color:var(--ink);-webkit-appearance:none;appearance:none;transition:border-color .15s}
input:focus,textarea:focus{outline:none;border-color:var(--wine);box-shadow:0 0 0 3px rgba(93,31,43,.08)}
textarea{resize:vertical;min-height:200px;line-height:1.6}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sel-btn{cursor:pointer;display:flex;justify-content:space-between;align-items:center;text-align:left}
.sel-btn.empty{color:var(--ink-faint)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:11px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border:none;width:100%;-webkit-appearance:none;transition:transform .08s,opacity .15s}
.btn:active{transform:scale(.98)}.btn[disabled]{opacity:.45;cursor:not-allowed}
.btn-p{background:var(--wine);color:#fff;margin-top:10px}
.btn-s{background:#fff;color:var(--wine);border:1px solid var(--paper-line);margin-top:8px;font-size:14px}
.btn-d{background:transparent;color:var(--danger);border:1px solid var(--paper-line);margin-top:10px;font-size:14px}
.btn-leaf{background:var(--leaf);color:#fff;margin-top:8px}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.drop{background:#fff;border:1px solid var(--paper-line);border-radius:9px;margin-top:3px;max-height:170px;overflow-y:auto;box-shadow:0 6px 18px rgba(0,0,0,.1);position:relative;z-index:5}
.drop button{display:block;width:100%;padding:11px 14px;background:none;border:none;border-bottom:1px solid var(--paper-line);text-align:left;font-size:14px;color:var(--ink);cursor:pointer;font-family:inherit}
.drop button:last-child{border-bottom:none}
.drop button.active{background:rgba(93,31,43,.06);font-weight:700;color:var(--wine)}
.hint{font-size:12px;color:var(--ink-faint);margin-top:6px;font-style:italic;font-family:'Fraunces',serif}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;background:var(--chalk-deep);color:var(--ink-soft);font-size:11px;font-weight:600}
.error{background:#fbe9e9;border:1px solid #e8c4c4;color:var(--danger);padding:12px 14px;border-radius:9px;font-size:14px;margin-bottom:12px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--wine);font-size:15px;font-weight:500;cursor:pointer;margin-bottom:14px;background:none;border:none;font-family:inherit;padding:6px 0}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 0;margin-bottom:8px}
.save-btn{background:var(--wine);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.bbch-sel{display:flex;align-items:center;padding:12px 14px;background:rgba(93,31,43,.04);border-radius:9px;margin-bottom:10px;border:1.5px solid var(--wine);gap:8px}
.bbch-code{font-size:13px;font-weight:700;color:var(--wine);background:rgba(93,31,43,.08);padding:2px 8px;border-radius:6px}
.bbch-x{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:18px;padding:4px;margin-left:auto}
.bbch-panel{background:#fff;border:1px solid var(--paper-line);border-radius:12px;margin-top:8px;padding:8px;box-shadow:0 6px 20px rgba(0,0,0,.1)}
.bbch-scroll{max-height:250px;overflow-y:auto}
.bbch-item{display:flex;align-items:center;gap:8px;width:100%;padding:9px 8px;background:none;border:none;border-bottom:1px solid var(--paper-line);text-align:left;cursor:pointer;border-radius:5px;font-family:inherit}
.bbch-item.active{background:var(--wine);color:#fff}
.bbch-ic{font-size:12px;font-weight:700;color:var(--wine);min-width:30px;text-align:center;background:rgba(93,31,43,.06);padding:2px 6px;border-radius:5px}
.bbch-item.active .bbch-ic{background:rgba(255,255,255,.2);color:#fff}
.meteo-row{display:flex;flex-wrap:wrap;gap:6px}
.meteo-btn{padding:8px 12px;border-radius:18px;border:1px solid var(--paper-line);background:#fff;font-size:13px;cursor:pointer;font-family:inherit}
.meteo-btn.active{background:rgba(93,31,43,.08);border-color:var(--wine);font-weight:600}
.dict-hint{background:linear-gradient(135deg,#fbf3e3,#f5e9d0);border:1px solid var(--paper-line);border-radius:11px;padding:14px 16px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start}
.dict-icon{flex-shrink:0;width:38px;height:38px;border-radius:10px;background:var(--wine);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px}
.dict-text{font-size:13px;line-height:1.55;color:var(--ink-soft)}.dict-text b{color:var(--ink);font-weight:600}
.ta-wrap{position:relative}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.photo-thumb{aspect-ratio:1;border-radius:8px;background:var(--chalk-deep) center/cover;position:relative;overflow:hidden}
.photo-thumb .rm{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-add{aspect-ratio:1;border-radius:8px;border:1.5px dashed var(--paper-line);display:flex;align-items:center;justify-content:center;background:transparent;color:var(--ink-faint);font-size:22px;cursor:pointer;font-family:inherit}
input[type=file]{display:none}
.loader{display:flex;align-items:center;justify-content:center;gap:10px;padding:24px;color:var(--ink-soft)}
.spinner{width:18px;height:18px;border:2px solid var(--paper-line);border-top-color:var(--wine);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
.hist-item{background:var(--paper);border:1px solid var(--paper-line);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:transform .08s}
.hist-item:active{transform:scale(.99)}
.hist-name{font-family:'Fraunces',serif;font-size:16px;color:var(--wine);font-weight:500}
.hist-meta{font-size:12px;color:var(--ink-faint);margin-top:2px}
.hist-arrow{color:var(--ink-faint);font-size:18px}
.empty-state{text-align:center;padding:32px 16px;color:var(--ink-faint)}
.empty-icon{font-family:'Fraunces',serif;font-size:42px;color:var(--paper-line);margin-bottom:8px;font-style:italic}
.meta-bar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--paper-line);gap:12px}
.meta-who{font-family:'Fraunces',serif;font-size:17px;font-weight:500;color:var(--wine);flex:1}
.meta-when{font-size:12px;color:var(--ink-faint);font-family:'Fraunces',serif;font-style:italic;white-space:nowrap}
.synth-card{background:var(--wine);color:#fff;border:none;padding:20px;border-radius:14px;margin-bottom:18px}
.synth-label{color:rgba(255,255,255,.65);font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px}
.synth-content{font-family:'Fraunces',serif;font-size:18px;line-height:1.4;font-weight:400}
.rpt-label{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--wine);margin-bottom:8px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sub-k{display:block;font-size:11px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.sub-v{font-family:'Fraunces',serif;font-size:15px;color:var(--ink)}
.rpt-li{padding:6px 0 6px 24px;position:relative;font-size:15px;line-height:1.55}
.rpt-li-n{position:absolute;left:0;font-family:'Fraunces',serif;font-size:13px;color:var(--wine);font-weight:500}
.san-item{margin-bottom:10px}.san-k{font-size:11px;color:var(--wine-soft);letter-spacing:.08em;text-transform:uppercase;font-weight:600}.san-v{margin-top:2px;font-size:14px;line-height:1.6;color:var(--ink)}
.rpt-content{font-size:14px;line-height:1.65;color:var(--ink)}
.edit-ta{width:100%;padding:10px 12px;background:#fff;border:1px solid var(--paper-line);border-radius:8px;font-family:'Geist',system-ui,sans-serif;font-size:14px;color:var(--ink);line-height:1.65;resize:vertical;min-height:80px;-webkit-appearance:none;transition:border-color .15s}
.edit-ta:focus{outline:none;border-color:var(--wine);box-shadow:0 0 0 3px rgba(93,31,43,.08)}
.edit-ta-sm{min-height:50px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--wine);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;animation:toastIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.sync-bar{display:flex;gap:8px;margin-top:8px}.sync-bar .btn{font-size:13px;padding:10px 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{transform:translateX(-50%) translateY(12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@media(max-width:380px){h1{font-size:24px}}
</style>

<body>
<div id="app"></div>
<script>
'use strict';

var MAIL='florent.miguel@sasu-viti-sens.fr';
var CEPAGES=['Chardonnay','Pinot Noir','Pinot Meunier','Pinot Blanc','Pinot Gris','Petit Meslier','Arbane'];
var METEOS=['\u2600\uFE0F Soleil','\u26C5 Couvert','\uD83C\uDF27\uFE0F Pluie','\uD83D\uDCA8 Vent','\uD83C\uDF2B\uFE0F Brouillard','\u2744\uFE0F Gel'];
var BBCH=[
  {code:'00',short:'Dormance',label:"Repos hivernal"},
  {code:'01',short:'Gonflement',label:"D\u00e9but gonflement bourgeons"},
  {code:'05',short:'Bourre',label:"Stade bourre"},
  {code:'07',short:'D\u00e9bourrement',label:"D\u00e9but du d\u00e9bourrement"},

  {code:'13',short:'3 feuilles',label:"3 feuilles \u00e9tal\u00e9es"},
  {code:'15',short:'Grappes visibles',label:"5 feuilles \u2013 grappes visibles"},
  {code:'17',short:'7 feuilles',label:"7 feuilles \u00e9tal\u00e9es"},
  {code:'19',short:'9+ feuilles',label:"9 feuilles ou plus"},
  {code:'53',short:'Inflorescences',label:"Inflorescences visibles"},
  {code:'55',short:'Boutons agglom.',label:"Boutons agglom\u00e9r\u00e9s"},
  {code:'57',short:'Boutons s\u00e9par\u00e9s',label:"Boutons s\u00e9par\u00e9s"},
  {code:'61',short:'D\u00e9but floraison',label:"10% capuchons tomb\u00e9s"},
  {code:'65',short:'Pleine floraison',label:"50% capuchons tomb\u00e9s"},
  {code:'69',short:'Fin floraison',label:"Fin de la floraison"},
  {code:'71',short:'Nouaison',label:"D\u00e9but formation baies"},
  {code:'73',short:'Grenaille',label:"Baies taille grenaille"},
  {code:'75',short:'Petit pois',label:"Baies taille petit pois"},
  {code:'77',short:'Fermeture grappe',label:"D\u00e9but fermeture"},
  {code:'79',short:'Grappes ferm\u00e9es',label:"Grappes ferm\u00e9es"},
  {code:'81',short:'D\u00e9but v\u00e9raison',label:"D\u00e9but v\u00e9raison"},
  {code:'85',short:'Ramollissement',label:"Ramollissement baies"},
  {code:'89',short:'Maturit\u00e9',label:"Pr\u00eat pour r\u00e9colte"},
  {code:'91',short:'Ao\u00fbtement',label:"Ao\u00fbtement du bois"},
  {code:'93',short:'Chute feuilles',label:"D\u00e9but chute feuilles"},
  {code:'97',short:'D\u00e9feuill\u00e9',label:"Chute compl\u00e8te"}
];

var SYS_PROMPT="Tu es l'assistant de Florent Miguel, consultant viticole ind\u00e9pendant VITI Sens (Reims, Champagne).\nTu transformes ses notes de terrain (souvent de simples listes ou mots-cl\u00e9s) et photos en compte-rendu professionnel d\u00e9velopp\u00e9.\n\nDICT\u00c9E iOS \u2014 corrige : \"Pino\" \u2192 \"Pinot\", \"mille doux\" \u2192 \"mildiou\", \"oh id\u00e9um\" \u2192 \"o\u00efdium\", \"botritis\" \u2192 \"botrytis\", \"black rote\" \u2192 \"black-rot\", \"essca\" \u2192 \"esca\". Ignore jurons.\n\nPHOTOS : fais confiance en priorit\u00e9 aux photos.\n\nSTYLE DE R\u00c9DACTION :\n- Chaque champ doit \u00eatre un COURT PARAGRAPHE r\u00e9dig\u00e9 (2-4 phrases), pas une simple liste.\n- \u00c0 partir de simples mots-cl\u00e9s, d\u00e9veloppe des observations professionnelles compl\u00e8tes.\n- Pour le stade BBCH : indique le code ET d\u00e9cris pr\u00e9cis\u00e9ment \u00e0 quoi il correspond (aspect des bourgeons, feuilles, grappes, baies selon le stade).\n- NE PAS inclure le stade Baggiolini.\n- Synth\u00e8se : 2-3 phrases qui r\u00e9sument l'essentiel de la visite.\n- Recommandations : phrases compl\u00e8tes et argument\u00e9es, pas de simples bullet points.\n\nR\u00c8GLES :\n- N'invente RIEN d'absent du texte ET des photos. null si non couvert.\n- Vocabulaire champenois pr\u00e9cis.\n- EXCLUSIVEMENT un JSON valide. Commence par {.\n\nSCH\u00c9MA :\n{\"synthese\":\"string (2-3 phrases)\",\"phenologie\":{\"stade_bbch\":\"string avec code ET description compl\u00e8te du stade|null\",\"homogeneite\":\"string|null\"},\"vigueur\":\"string (paragraphe)|null\",\"sanitaire\":{\"mildiou\":\"string (paragraphe)|null\",\"oidium\":\"string (paragraphe)|null\",\"botrytis\":\"string (paragraphe)|null\",\"black_rot\":\"string (paragraphe)|null\",\"autres_maladies\":\"string|null\",\"ravageurs\":\"string|null\"},\"climatique\":\"string|null\",\"sol_couvert\":\"string|null\",\"autres_constats\":\"string|null\",\"recommandations\":[\"string (phrase compl\u00e8te)\"],\"interventions\":[\"string (phrase compl\u00e8te)\"]}";

// ═══ STATE ═══
var S={screen:'home',current:null,history:[],parcelles:[],lastClient:null,busy:false,error:null,bbchOpen:false,bbchQ:'',cepageOpen:false,parcelleOpen:false};

// ═══ STORAGE ═══
function lsGet(k){try{var v=localStorage.getItem('vs_'+k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem('vs_'+k,JSON.stringify(v))}catch(e){}}
function lsDel(k){try{localStorage.removeItem('vs_'+k)}catch(e){}}
function loadHistory(){
  var keys=[],items=[];
  for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('vs_obs:')===0)keys.push(k)}
  for(var j=0;j<keys.length;j++){try{var v=JSON.parse(localStorage.getItem(keys[j]));if(v)items.push(v)}catch(e){}}
  items.sort(function(a,b){return b.createdAt.localeCompare(a.createdAt)});
  return items;
}

// ═══ UTILS ═══
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(iso){var d=new Date(iso);return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})+' \u00b7 '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}

function newObs(){
  return{id:'obs_'+Date.now().toString(36),createdAt:new Date().toISOString(),
    parcelle:'',commune:'',cepage:'',bbch:null,meteo:'',
    client:S.lastClient?{nom:S.lastClient.nom,email:S.lastClient.email}:{nom:'',email:''},
    notes:'',photos:[],structured:null};
}

function compressImage(file,maxDim,quality){
  maxDim=maxDim||960;quality=quality||0.6;
  return new Promise(function(res,rej){
    var reader=new FileReader();
    reader.onerror=rej;
    reader.onload=function(){
      var img=new Image();img.onerror=rej;
      img.onload=function(){
        var c=document.createElement('canvas');var w=img.width,h=img.height;
        if(w>maxDim||h>maxDim){var s=Math.min(maxDim/w,maxDim/h);w=Math.round(w*s);h=Math.round(h*s)}
        c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function extractJson(text){
  try{return JSON.parse(text)}catch(e){}
  var c=text.replace(/```(?:json)?\s*/gi,'').replace(/```/g,'').trim();
  try{return JSON.parse(c)}catch(e){}
  var f=c.indexOf('{'),l=c.lastIndexOf('}');
  if(f!==-1&&l>f)try{return JSON.parse(c.substring(f,l+1))}catch(e){}
  throw new Error('R\u00e9ponse IA invalide');
}

function showToast(msg){
  var old=document.querySelector('.toast');if(old)old.remove();
  var t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove()},2200);
}

function saveCurrent(){
  var o=S.current;if(!o)return;
  lsSet('obs:'+o.id,o);
  if(o.parcelle){
    if(!S.parcelles.some(function(p){return p.toLowerCase()===o.parcelle.toLowerCase()})){
      S.parcelles.push(o.parcelle);S.parcelles.sort(function(a,b){return a.localeCompare(b,'fr')});
      lsSet('parcelles',S.parcelles);
    }
    lsSet('pmeta:'+o.parcelle.toLowerCase(),{commune:o.commune||'',cepage:o.cepage||'',nom:o.client.nom||'',email:o.client.email||''});
  }
  if(o.client&&o.client.nom){S.lastClient={nom:o.client.nom,email:o.client.email};lsSet('lastClient',S.lastClient)}
  S.history=loadHistory();
}

function loadParcelMeta(name){return name?lsGet('pmeta:'+name.toLowerCase()):null}

// ═══ RENDER ═══
function render(){
  var app=document.getElementById('app');
  var h='<header class="brand"><div><div class="logo"><b>VITI</b> <em>Sens</em></div><div class="tagline">Carnet de terrain</div></div></header>';
  if(S.screen==='home')h+=renderHome();
  else if(S.screen==='edit')h+=renderEdit();
  else if(S.screen==='report')h+=renderReport();

function bind(){
  var $=function(id){return document.getElementById(id)};
  if(S.screen==='home'){
    $('btn-new')&&$('btn-new').addEventListener('click',function(){S.current=newObs();S.screen='edit';S.error=null;S.bbchOpen=false;S.bbchQ='';S.cepageOpen=false;S.parcelleOpen=false;render()});
    document.querySelectorAll('.hist-item').forEach(function(el){el.addEventListener('click',function(){
      var o=S.history.find(function(x){return x.id===el.dataset.id});
      if(o){S.current=JSON.parse(JSON.stringify(o));S.screen=o.structured?'report':'edit';S.error=null;S.bbchOpen=false;render()}
    })});
    $('btn-export')&&$('btn-export').addEventListener('click',exportData);
    $('btn-import')&&$('btn-import').addEventListener('click',function(){$('f-import').click()});
    $('f-import')&&$('f-import').addEventListener('change',importData);
    $('btn-apikey')&&$('btn-apikey').addEventListener('click',function(){
      var current=lsGet('apikey');
      var input=prompt('Cl\u00e9 API Anthropic (sk-ant-...)\nCr\u00e9e-la sur console.anthropic.com \u2192 API Keys.'+(current?'\n\nUne cl\u00e9 est d\u00e9j\u00e0 enregistr\u00e9e.':''));
      if(input&&input.trim()){lsSet('apikey',input.trim());showToast('Cl\u00e9 enregistr\u00e9e \u2713');render()}
    });
  }
  if(S.screen==='edit'){
    $('btn-back')&&$('btn-back').addEventListener('click',function(){S.screen='home';S.error=null;render()});
    $('btn-save')&&$('btn-save').addEventListener('click',function(){syncFields();saveCurrent();showToast('Enregistr\u00e9 \u2713');S.screen='home';render()});
    $('f-parcelle')&&$('f-parcelle').addEventListener('input',function(e){
      S.current.parcelle=e.target.value;S.parcelleOpen=true;
      // Mettre à jour uniquement le dropdown sans reconstruire tout le DOM
      var existing=document.querySelector('.drop');if(existing)existing.remove();
      var fp=S.parcelles.filter(function(p){return p.toLowerCase().indexOf((e.target.value||'').toLowerCase())!==-1});
      if(fp.length&&e.target.value){
        var d=document.createElement('div');d.className='drop';
        fp.forEach(function(p){
          var b=document.createElement('button');b.textContent=p;b.setAttribute('data-parc',p);
          b.addEventListener('mousedown',function(ev){
            ev.preventDefault();S.current.parcelle=p;S.parcelleOpen=false;
            var meta=loadParcelMeta(p);
            if(meta){
              if(meta.commune&&!S.current.commune)S.current.commune=meta.commune;
              if(meta.cepage&&!S.current.cepage)S.current.cepage=meta.cepage;
              if(meta.nom&&!S.current.client.nom){S.current.client.nom=meta.nom;S.current.client.email=meta.email||''}
            }
            render();
          });
          d.appendChild(b);
        });
        e.target.parentNode.parentNode.insertBefore(d,e.target.parentNode.nextSibling);
      }
    });
    $('f-parcelle')&&$('f-parcelle').addEventListener('focus',function(){S.parcelleOpen=true});
    $('f-parcelle')&&$('f-parcelle').addEventListener('blur',function(){setTimeout(function(){S.parcelleOpen=false;var d=document.querySelector('.drop');if(d)d.remove()},200)});
    $('f-commune')&&$('f-commune').addEventListener('input',function(e){S.current.commune=e.target.value});
    $('btn-cepage')&&$('btn-cepage').addEventListener('click',function(){S.cepageOpen=!S.cepageOpen;render()});
    document.querySelectorAll('[data-cep]').forEach(function(b){b.addEventListener('click',function(){S.current.cepage=b.dataset.cep;S.cepageOpen=false;render()})});
    $('f-client')&&$('f-client').addEventListener('input',function(e){S.current.client.nom=e.target.value});
    $('f-email')&&$('f-email').addEventListener('input',function(e){S.current.client.email=e.target.value});
    $('btn-bbch')&&$('btn-bbch').addEventListener('click',function(){S.bbchOpen=!S.bbchOpen;S.bbchQ='';render()});
    $('bbch-clear')&&$('bbch-clear').addEventListener('click',function(){S.current.bbch=null;render()});
    $('f-bbch-q')&&$('f-bbch-q').addEventListener('input',function(e){S.bbchQ=e.target.value;render();$('f-bbch-q')&&$('f-bbch-q').focus()});
    document.querySelectorAll('[data-bbch]').forEach(function(b){b.addEventListener('click',function(){S.current.bbch=BBCH.find(function(x){return x.code===b.dataset.bbch})||null;S.bbchOpen=false;S.bbchQ='';render()})});
    document.querySelectorAll('[data-meteo]').forEach(function(b){b.addEventListener('click',function(){S.current.meteo=S.current.meteo===b.dataset.meteo?'':b.dataset.meteo;render()})});
    $('f-notes')&&$('f-notes').addEventListener('input',function(e){S.current.notes=e.target.value;var badge=document.querySelector('.card h3 .badge');if(badge)badge.textContent=e.target.value.length+' car.'});
    $('f-photos')&&$('f-photos').addEventListener('change',function(e){
      var files=Array.from(e.target.files);
      var chain=Promise.resolve();
      files.forEach(function(f){chain=chain.then(function(){return compressImage(f).then(function(du){S.current.photos.push({id:'p_'+Date.now()+Math.random().toString(36).slice(2,5),dataUrl:du})}).catch(function(){})})});
      chain.then(function(){e.target.value='';render()});
    });
    document.querySelectorAll('[data-pid]').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();S.current.photos=S.current.photos.filter(function(p){return p.id!==b.dataset.pid});render()})});
    $('btn-struct')&&$('btn-struct').addEventListener('click',function(){syncFields();doStructure()});
    $('btn-raw-send')&&$('btn-raw-send').addEventListener('click',function(){syncFields();saveCurrent();sendEmail()});
  }
  if(S.screen==='report'){
    $('btn-back')&&$('btn-back').addEventListener('click',function(){S.screen='home';render()});
    $('btn-edit')&&$('btn-edit').addEventListener('click',function(){S.screen='edit';S.bbchOpen=false;render()});
    $('btn-pdf')&&$('btn-pdf').addEventListener('click',function(){syncReport();saveCurrent();generatePDF(false)});
    $('btn-send-pdf')&&$('btn-send-pdf').addEventListener('click',function(){syncReport();saveCurrent();generatePDF(true)});
    $('btn-delete')&&$('btn-delete').addEventListener('click',function(){if(!confirm('Supprimer ?'))return;lsDel('obs:'+S.current.id);S.history=loadHistory();S.screen='home';render();showToast('Supprim\u00e9')});
    // Auto-resize textareas
    document.querySelectorAll('.edit-ta').forEach(function(ta){
      ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
      ta.addEventListener('input',function(){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px'});
    });
  }
}

function syncFields(){
  var o=S.current;if(!o)return;
  var v=function(id){var el=document.getElementById(id);return el?el.value:''};
  o.parcelle=v('f-parcelle');o.commune=v('f-commune');
  o.client.nom=v('f-client');o.client.email=v('f-email');o.notes=v('f-notes');
}

function syncReport(){
  var o=S.current;if(!o||!o.structured)return;
  var s=o.structured;
  document.querySelectorAll('.edit-ta').forEach(function(ta){
    var field=ta.getAttribute('data-field');if(!field)return;
    var val=ta.value;
    var parts=field.split('.');
    if(parts.length===1){
      s[parts[0]]=val;
    } else if(parts.length===2){
      var idx=parseInt(parts[1]);
      if(!isNaN(idx)){
        // Array field like recommandations.0
        if(s[parts[0]])s[parts[0]][idx]=val;
      } else {
        // Nested object like phenologie.stade_bbch
        if(!s[parts[0]])s[parts[0]]={};
        s[parts[0]][parts[1]]=val;
      }
    }
  });
}

// ═══ STRUCTURATION IA ═══
function getApiKey(){
  var k=lsGet('apikey');
  if(k)return k;
  var input=prompt('Entre ta cl\u00e9 API Anthropic (commence par sk-ant-...)\n\nTu peux la cr\u00e9er sur console.anthropic.com \u2192 API Keys.\nElle reste stock\u00e9e localement sur cet appareil.');
  if(!input||!input.trim())return null;
  input=input.trim();
  lsSet('apikey',input);
  return input;
}

function doStructure(){
  var o=S.current;
  if((!o.notes||!o.notes.trim())&&!o.photos.length){S.error='Saisis tes notes ou ajoute une photo.';render();return}
  var apiKey=getApiKey();
  if(!apiKey){S.error='Cl\u00e9 API requise pour la structuration IA.';render();return}
  S.busy=true;S.error=null;render();
  var parts=['Notes de terrain \u2014 '+fmtDate(o.createdAt)];
  if(o.parcelle)parts.push('Parcelle : '+o.parcelle+(o.commune?' ('+o.commune+')':''));
  if(o.cepage)parts.push('C\u00e9page : '+o.cepage);
  if(o.bbch)parts.push('BBCH : '+o.bbch.code+' \u2013 '+o.bbch.label);
  if(o.meteo)parts.push('M\u00e9t\u00e9o : '+o.meteo);
  parts.push('','NOTES :',o.notes||'(photos uniquement)');
  if(o.photos.length)parts.push('',o.photos.length+' photo(s).');
  parts.push('','Produis le CR en JSON.');
  var content=[{type:'text',text:SYS_PROMPT+'\n\n\u2014\u2014\u2014\n\n'+parts.join('\n')}];
  for(var i=0;i<o.photos.length;i++){var b64=o.photos[i].dataUrl.split(',')[1];content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}})}
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:content}]})
  }).then(function(r){return r.text()}).then(function(raw){
    var data;try{data=JSON.parse(raw)}catch(e){throw new Error('R\u00e9ponse invalide')}
    if(data.error)throw new Error(data.error.message||'Erreur API');
    var text=data.content.filter(function(b){return b.type==='text'}).map(function(b){return b.text}).join('\n').trim();
    if(!text)throw new Error('R\u00e9ponse vide');
    S.current.structured=extractJson(text);
    saveCurrent();S.screen='report';
  }).catch(function(e){
    var msg=e.message||String(e);
    if(msg.indexOf('401')!==-1||msg.indexOf('invalid')!==-1||msg.indexOf('authentication')!==-1){
      lsDel('apikey');
      msg='Cl\u00e9 API invalide \u2014 elle a \u00e9t\u00e9 supprim\u00e9e. R\u00e9essaie pour en saisir une nouvelle.';
    }
    S.error='Structuration impossible \u2014 '+msg;
    window.scrollTo(0,0);
  }).finally(function(){S.busy=false;render()});
}

// ═══ PDF (lazy load jsPDF + fallback HTML) ═══
function generatePDF(andEmail){
  var o=S.current;if(!o)return;
  showToast('G\u00e9n\u00e9ration du PDF\u2026');
  if(window.jspdf){buildPDF(o,andEmail);return}
  var sc=document.createElement('script');
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js';
  sc.onload=function(){buildPDF(o,andEmail)};
  sc.onerror=function(){
    showToast('jsPDF indisponible \u2014 ouverture version imprimable');
    buildHTMLFallback(o,andEmail);
  };
  document.head.appendChild(sc);
  // Timeout fallback si le script ne charge pas en 5s
  setTimeout(function(){if(!window.jspdf)buildHTMLFallback(o,andEmail)},5000);
}

function buildPDF(o,andEmail){
  var s=o.structured||{};
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var W=210,M=18,CW=W-2*M,y=18;
  var wine=[93,31,43],ink=[26,24,20],gray=[140,134,120],white=[255,255,255];

  // Header
  doc.setFillColor(wine[0],wine[1],wine[2]);doc.rect(0,0,W,32,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('Compte-Rendu de Visite',M,14);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('VITI SENS',M,20);
  doc.setFontSize(10);doc.setFont('helvetica','bold');
  var ds=new Date(o.createdAt).toLocaleDateString('fr-FR')+' '+new Date(o.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  doc.text(ds,W-M,14,{align:'right'});y=40;

  // Info box
  doc.setFillColor(250,248,242);doc.roundedRect(M,y,CW,28,3,3,'F');
  doc.setDrawColor(217,207,186);doc.roundedRect(M,y,CW,28,3,3,'S');
  doc.setFontSize(7);doc.setTextColor(gray[0],gray[1],gray[2]);doc.setFont('helvetica','bold');
  doc.text('PARCELLE',M+4,y+6);doc.text('C\u00c9PAGE',M+CW/2+4,y+6);
  doc.text('M\u00c9T\u00c9O',M+4,y+18);doc.text('BBCH',M+CW/2+4,y+18);
  doc.setFontSize(10);doc.setTextColor(ink[0],ink[1],ink[2]);doc.setFont('helvetica','normal');
  doc.text(o.parcelle||'\u2014',M+4,y+11);doc.text(o.cepage||'\u2014',M+CW/2+4,y+11);
  doc.text(o.meteo||'\u2014',M+4,y+23);doc.text(o.bbch?o.bbch.code+' \u2013 '+o.bbch.short:'\u2014',M+CW/2+4,y+23);
  y+=34;
  if(o.client&&o.client.nom){doc.setFontSize(8);doc.setTextColor(gray[0],gray[1],gray[2]);doc.text('Client : '+o.client.nom+(o.commune?' \u00b7 '+o.commune:''),M,y);y+=6}

  function sec(title,content){
    if(y>260){doc.addPage();y=18}
    doc.setFillColor(wine[0],wine[1],wine[2]);doc.rect(M,y,2,5,'F');
    doc.setFontSize(8);doc.setTextColor(wine[0],wine[1],wine[2]);doc.setFont('helvetica','bold');
    doc.text(title.toUpperCase(),M+5,y+4);y+=8;
    doc.setFontSize(10);doc.setTextColor(ink[0],ink[1],ink[2]);doc.setFont('helvetica','normal');
    var lines=doc.splitTextToSize(content,CW-4);
    doc.text(lines,M+2,y);y+=lines.length*5+4;
  }

  if(s.synthese){
    doc.setFontSize(11);var sl=doc.splitTextToSize(s.synthese,CW-12);var sh=sl.length*5.5+14;
    doc.setFillColor(wine[0],wine[1],wine[2]);doc.roundedRect(M,y,CW,sh,3,3,'F');
    doc.setFontSize(7);doc.setTextColor(200,180,170);doc.setFont('helvetica','bold');doc.text('SYNTH\u00c8SE',M+6,y+6);
    doc.setFontSize(11);doc.setTextColor(255,255,255);doc.setFont('helvetica','normal');doc.text(sl,M+6,y+12);
    y+=sh+6;
  }
  if(s.phenologie&&s.phenologie.stade_bbch)sec('Ph\u00e9nologie',s.phenologie.stade_bbch+(s.phenologie.homogeneite?' '+s.phenologie.homogeneite:''));
  if(s.vigueur)sec('Vigueur',s.vigueur);
  var san=s.sanitaire||{},sp=[];
  if(san.mildiou)sp.push('Mildiou: '+san.mildiou);if(san.oidium)sp.push('O\u00efdium: '+san.oidium);
  if(san.botrytis)sp.push('Botrytis: '+san.botrytis);if(san.black_rot)sp.push('Black-rot: '+san.black_rot);
  if(san.autres_maladies)sp.push('Autres: '+san.autres_maladies);if(san.ravageurs)sp.push('Ravageurs: '+san.ravageurs);
  if(sp.length)sec('\u00c9tat sanitaire',sp.join(' \u00b7 '));
  if(s.climatique)sec('Climat',s.climatique);
  if(s.sol_couvert)sec('Sol / Couvert',s.sol_couvert);
  if(s.autres_constats)sec('Autres',s.autres_constats);
  if(s.recommandations&&s.recommandations.length)sec('Recommandations',s.recommandations.map(function(r,i){return(i+1)+'. '+r}).join('\n'));
  if(s.interventions&&s.interventions.length)sec('Interventions',s.interventions.map(function(r,i){return(i+1)+'. '+r}).join('\n'));

  // Photos
  if(o.photos.length){
    if(y>200){doc.addPage();y=18}
    doc.setFillColor(wine[0],wine[1],wine[2]);doc.rect(M,y,2,5,'F');
    doc.setFontSize(8);doc.setTextColor(wine[0],wine[1],wine[2]);doc.setFont('helvetica','bold');
    doc.text('PHOTOS ('+o.photos.length+')',M+5,y+4);y+=10;
    var pw=(CW-6)/2,ph=pw*0.75;
    for(var i=0;i<o.photos.length;i++){
      if(y+ph>275){doc.addPage();y=18}
      var x=M+(i%2)*(pw+6);
      try{doc.addImage(o.photos[i].dataUrl,'JPEG',x,y,pw,ph)}catch(e){}
      if(i%2===1||i===o.photos.length-1)y+=ph+4;
    }
  }
  // Footer
  if(y>270){doc.addPage();y=18}
  doc.setDrawColor(217,207,186);doc.line(M,y+2,W-M,y+2);
  doc.setFontSize(8);doc.setTextColor(gray[0],gray[1],gray[2]);doc.setFont('helvetica','normal');
  doc.text('Florent Miguel \u00b7 VITI Sens \u00b7 Reims',W/2,y+8,{align:'center'});
  doc.text(MAIL,W/2,y+13,{align:'center'});

  var fname='CR_'+(o.parcelle||'Visite').replace(/\s+/g,'_')+'_'+new Date(o.createdAt).toLocaleDateString('fr-FR').replace(/\//g,'-')+'.pdf';
  doc.save(fname);
  showToast('PDF t\u00e9l\u00e9charg\u00e9 \u2713');

  if(andEmail){
    setTimeout(function(){
      var subj='CR VITI Sens \u2014 '+(o.parcelle||'visite')+' \u2014 '+new Date(o.createdAt).toLocaleDateString('fr-FR');
      var body='Bonjour,\n\nVeuillez trouver ci-joint le compte-rendu de visite parcellaire.\n\nCordialement,\nFlorent Miguel\nVITI Sens';
      var to=(o.client&&o.client.email)?o.client.email:'';
      window.location.href='mailto:'+encodeURIComponent(to)+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);
    },800);
  }
}

// ═══ SYNC ═══
function exportData(){
  var data={parcelles:S.parcelles,history:S.history,lastClient:S.lastClient,meta:{}};
  // Exporter aussi les métadonnées parcelles
  for(var i=0;i<S.parcelles.length;i++){var m=loadParcelMeta(S.parcelles[i]);if(m)data.meta[S.parcelles[i].toLowerCase()]=m}
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='viti-sens-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('Donn\u00e9es export\u00e9es \u2713');
}

function importData(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var data=JSON.parse(reader.result);
      // Fusionner parcelles
      if(data.parcelles){
        data.parcelles.forEach(function(p){
          if(!S.parcelles.some(function(x){return x.toLowerCase()===p.toLowerCase()}))S.parcelles.push(p);
        });
        S.parcelles.sort(function(a,b){return a.localeCompare(b,'fr')});
        lsSet('parcelles',S.parcelles);
      }
      // Fusionner observations
      if(data.history){
        data.history.forEach(function(o){
          if(!S.history.some(function(x){return x.id===o.id})){lsSet('obs:'+o.id,o)}
        });
      }
      // Métadonnées parcelles
      if(data.meta){Object.keys(data.meta).forEach(function(k){lsSet('pmeta:'+k,data.meta[k])})}
      if(data.lastClient){S.lastClient=data.lastClient;lsSet('lastClient',data.lastClient)}
      S.history=loadHistory();
      render();
      showToast('+'+((data.history&&data.history.length)||0)+' observations import\u00e9es \u2713');
    }catch(err){showToast('Fichier invalide')}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ═══ INIT ═══
S.lastClient=lsGet('lastClient');
S.parcelles=lsGet('parcelles')||[];
S.history=loadHistory();
render();
